<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Page Not Found — ntony4u.site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .tunnel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .container {
            z-index: 33;
            position: relative;
            max-width: 1000px;
            width: 100%;
        }

        .top-section {
            margin-bottom: 33px;
        }

        .error-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .error-code {
            font-size: 100px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
            display: inline-block;
        }

        @keyframes pulse {
            0% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 0 0 25px rgba(102, 126, 234, 0.3);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.6), 0 0 60px rgba(102, 126, 234, 0.5);
                transform: scale(1.05);
            }
        }

        .submessage {
            font-size: 16px;
            margin-bottom: 25px;
            opacity: 0.9;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .home-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 14px 32px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 31;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .game-side-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            min-width: 130px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .panel-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .panel-value {
            font-size: 42px;
            font-weight: bold;
            line-height: 1;
        }

        .panel-sub {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .game-status-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800;
            margin-right: 8px;
        }

        .status-indicator.playing {
            background: #4caf50;
            animation: blink 1s infinite;
        }

        .status-indicator.gameover {
            background: #f44336;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .restart-btn-panel {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        .restart-btn-panel:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .game-area {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        canvas {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .game-hint {
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
            opacity: 0.6;
        }

        .floating {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        .floating-1 { top: 15%; left: 5%; animation-delay: 0s; }
        .floating-2 { top: 70%; right: 8%; animation-delay: -2s; }
        .floating-3 { bottom: 15%; left: 15%; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(120deg); }
            66% { transform: translateY(8px) rotate(240deg); }
        }

        @media (max-width: 800px) {
            .game-container {
                flex-direction: column;
            }
            .game-side-panel {
                width: 100%;
                text-align: center;
            }
            .panel-value {
                font-size: 32px;
            }
            .error-code { font-size: 70px; }
            .error-title { font-size: 24px; }
            canvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
    <div class="tunnel-overlay" id="tunnelOverlay"></div>
    
    <div class="floating floating-1"></div>
    <div class="floating floating-2"></div>
    <div class="floating floating-3"></div>

    <div class="container">
        <div class="top-section">
            <h1 class="error-title">Page Not Found</h1>
            <div class="error-code">404</div>
            <p class="submessage">The page went on an adventure... but you can go home!</p>
            <a href="/" class="home-link" id="homeLink">← Return to homepage</a>
        </div>

        <div class="game-container">
            <div class="game-side-panel panel-left">
                <div class="panel-label">🎯 SCORE</div>
                <div class="panel-value" id="panelScore">0</div>
                <div class="panel-sub">points</div>
                
                <div style="margin-top: 20px;"></div>
                
                <div class="panel-label">🏆 BEST SCORE</div>
                <div class="panel-value" id="panelHighscore">0</div>
                <div class="panel-sub">all time</div>
            </div>

            <div class="game-area">
                <canvas id="gameCanvas" width="500" height="300" style="width:100%; max-width:500px; height:auto; cursor:pointer"></canvas>
                <div class="game-hint">✨ Click on the glowing light to start and play! ✨</div>
            </div>

            <div class="game-side-panel panel-right">
                <div class="panel-label">⏱️ TIME PLAYED</div>
                <div class="panel-value" id="panelTime" style="font-family: monospace; font-size: 32px;">00:00</div>
                <div class="panel-sub">seconds</div>
                
                <div class="game-status-panel">
                    <div class="panel-label">
                        <span class="status-indicator" id="statusIndicator"></span> STATUS
                    </div>
                    <div id="gameStatusText">CLICK TO START</div>
                    <button class="restart-btn-panel" id="restartBtnPanel">🔄 NEW GAME</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== ЭФФЕКТ ТОННЕЛЯ ==========
        const tunnelOverlay = document.getElementById('tunnelOverlay');
        const homeLinkBtn = document.getElementById('homeLink');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function updateTunnelEffect() {
            const buttonRect = homeLinkBtn.getBoundingClientRect();
            const buttonCenterX = buttonRect.left + buttonRect.width / 2;
            const buttonCenterY = buttonRect.top + buttonRect.height / 2;
            
            const dx = mouseX - buttonCenterX;
            const dy = mouseY - buttonCenterY;
            const distanceToButton = Math.sqrt(dx * dx + dy * dy);
            
            const maxDistance = Math.min(window.innerWidth, window.innerHeight) * 0.8;
            let normalized = Math.min(distanceToButton / maxDistance, 1);
            
            let radiusPx = 589 - (normalized * 589);
            radiusPx = Math.max(33, Math.min(589, radiusPx));
            
            let darkness = 0.2 + (normalized * 0.75);
            darkness = Math.min(0.95, darkness);
            
            const gradient = `radial-gradient(circle at ${mouseX}px ${mouseY}px, 
                                transparent 0px, 
                                transparent ${radiusPx}px, 
                                rgba(0, 0, 0, ${darkness}) ${radiusPx + 20}px, 
                                rgba(0, 0, 0, 0.95) 100%)`;
            
            tunnelOverlay.style.background = gradient;
            
            if (distanceToButton < 150) {
                const intensity = Math.min(1, (150 - distanceToButton) / 150);
                homeLinkBtn.style.boxShadow = `0 0 ${15 + intensity * 35}px rgba(255, 255, 255, ${0.2 + intensity * 0.6})`;
                homeLinkBtn.style.transform = `scale(${1 + intensity * 0.02})`;
            } else {
                homeLinkBtn.style.boxShadow = '';
                homeLinkBtn.style.transform = '';
            }
        }
        
        function animateTunnel() {
            updateTunnelEffect();
            requestAnimationFrame(animateTunnel);
        }
        animateTunnel();

        // ========== ИГРА ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 500;
        canvas.height = 300;
        
        let score = 0;
        let highscore = localStorage.getItem('catchLightHighscore') || 0;
        let gameActive = false;
        let gameStarted = false;
        let gameTimeSeconds = 0;
        let gameTimer = null;
        let idleMoveInterval = null;
        
        let firefly = {
            x: 0,
            y: 0,
            radius: 16,
            visible: true,
            disappearTimeout: null,
            pulse: 0
        };
        
        const panelScore = document.getElementById('panelScore');
        const panelHighscore = document.getElementById('panelHighscore');
        const panelTime = document.getElementById('panelTime');
        const gameStatusText = document.getElementById('gameStatusText');
        const statusIndicator = document.getElementById('statusIndicator');
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function updatePanels() {
            panelScore.textContent = score;
            panelHighscore.textContent = highscore;
            panelTime.textContent = formatTime(gameTimeSeconds);
        }
        
        function addScore() {
            score++;
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('catchLightHighscore', highscore);
            }
            updatePanels();
        }
        
        function randomMoveFirefly() {
            if (!gameStarted && !gameActive) {
                firefly.x = Math.random() * (canvas.width - firefly.radius * 2 - 20) + firefly.radius + 10;
                firefly.y = Math.random() * (canvas.height - firefly.radius * 2 - 20) + firefly.radius + 10;
                firefly.pulse = 1;
            }
        }
        
        function startIdleMovement() {
            if (idleMoveInterval) clearInterval(idleMoveInterval);
            idleMoveInterval = setInterval(() => {
                randomMoveFirefly();
            }, 1500);
        }
        
        function stopIdleMovement() {
            if (idleMoveInterval) {
                clearInterval(idleMoveInterval);
                idleMoveInterval = null;
            }
        }
        
        function gameOver() {
            if (!gameActive) return;
            
            gameActive = false;
            gameStarted = false;
            
            if (firefly.disappearTimeout) clearTimeout(firefly.disappearTimeout);
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = null;
            
            firefly.visible = true;
            randomMoveFirefly();
            
            gameStatusText.textContent = 'GAME OVER';
            statusIndicator.className = 'status-indicator gameover';
            
            startIdleMovement();
        }
        
        function showFirefly() {
            if (!gameActive) return;
            
            if (firefly.disappearTimeout) clearTimeout(firefly.disappearTimeout);
            
            firefly.x = Math.random() * (canvas.width - firefly.radius * 2 - 20) + firefly.radius + 10;
            firefly.y = Math.random() * (canvas.height - firefly.radius * 2 - 20) + firefly.radius + 10;
            firefly.visible = true;
            firefly.pulse = 1;
            
            firefly.disappearTimeout = setTimeout(() => {
                if (firefly.visible && gameActive) {
                    firefly.visible = false;
                    gameOver();
                }
            }, 1200);
        }
        
        function startGame() {
            stopIdleMovement();
            
            if (gameTimer) clearInterval(gameTimer);
            if (firefly.disappearTimeout) clearTimeout(firefly.disappearTimeout);
            
            gameActive = true;
            gameStarted = true;
            score = 0;
            gameTimeSeconds = 0;
            updatePanels();
            
            gameStatusText.textContent = 'PLAYING';
            statusIndicator.className = 'status-indicator playing';
            
            gameTimer = setInterval(() => {
                if (gameActive) {
                    gameTimeSeconds++;
                    panelTime.textContent = formatTime(gameTimeSeconds);
                }
            }, 1000);
            
            showFirefly();
        }
        
        function checkCatch(e) {
            if (!firefly.visible) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            
            if (canvasX < 0 || canvasX > canvas.width || canvasY < 0 || canvasY > canvas.height) return;
            
            const dx = canvasX - firefly.x;
            const dy = canvasY - firefly.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance <= firefly.radius && firefly.visible) {
                if (!gameStarted) {
                    startGame();
                    return;
                }
                
                if (!gameActive) return;
                
                addScore();
                
                if (firefly.disappearTimeout) clearTimeout(firefly.disappearTimeout);
                firefly.visible = false;
                firefly.pulse = 1;
                
                const absX = rect.left + (canvasX / canvas.width) * rect.width;
                const absY = rect.top + (canvasY / canvas.height) * rect.height;
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.style.position = 'fixed';
                    particle.style.pointerEvents = 'none';
                    particle.style.width = Math.random() * 6 + 3 + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = 'radial-gradient(circle, #fff, #ffcc44)';
                    particle.style.borderRadius = '50%';
                    particle.style.left = (absX + (Math.random() - 0.5) * 40) + 'px';
                    particle.style.top = (absY + (Math.random() - 0.5) * 40) + 'px';
                    particle.style.zIndex = '999';
                    particle.style.opacity = '1';
                    particle.style.transition = 'all 0.5s ease-out';
                    document.body.appendChild(particle);
                    
                    setTimeout(() => {
                        particle.style.opacity = '0';
                        particle.style.transform = 'scale(2)';
                        setTimeout(() => particle.remove(), 500);
                    }, 10);
                }
                
                setTimeout(() => {
                    if (gameActive) showFirefly();
                }, 250);
            }
        }
        
        function resetGame() {
            stopIdleMovement();
            
            if (gameTimer) clearInterval(gameTimer);
            if (firefly.disappearTimeout) clearTimeout(firefly.disappearTimeout);
            
            gameActive = false;
            gameStarted = false;
            score = 0;
            gameTimeSeconds = 0;
            firefly.visible = true;
            randomMoveFirefly();
            updatePanels();
            
            gameStatusText.textContent = 'CLICK TO START';
            statusIndicator.className = 'status-indicator';
            
            startIdleMovement();
        }
        
        function draw() {
            if (!ctx) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            for (let i = 0; i < 80; i++) {
                if (Math.random() > 0.97) {
                    ctx.beginPath();
                    ctx.arc((i * 131) % canvas.width, (i * 253) % canvas.height, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            if (firefly.visible) {
                const pulseSize = firefly.pulse > 0 ? 1 + firefly.pulse * 0.3 : 1 + Math.sin(Date.now() * 0.012) * 0.1;
                if (firefly.pulse > 0) firefly.pulse -= 0.05;
                
                const currentRadius = firefly.radius * pulseSize;
                
                const gradient = ctx.createRadialGradient(firefly.x, firefly.y, 3, firefly.x, firefly.y, currentRadius + 18);
                gradient.addColorStop(0, 'rgba(255, 240, 150, 0.9)');
                gradient.addColorStop(0.4, 'rgba(255, 200, 80, 0.5)');
                gradient.addColorStop(1, 'rgba(255, 100, 50, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(firefly.x, firefly.y, currentRadius + 18, 0, Math.PI * 2);
                ctx.fill();
                
                const coreGradient = ctx.createRadialGradient(firefly.x - 3, firefly.y - 3, 2, firefly.x, firefly.y, currentRadius);
                coreGradient.addColorStop(0, '#ffffdd');
                coreGradient.addColorStop(0.5, '#ffcc55');
                coreGradient.addColorStop(1, '#ff8844');
                ctx.fillStyle = coreGradient;
                ctx.beginPath();
                ctx.arc(firefly.x, firefly.y, currentRadius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(firefly.x - 5, firefly.y - 4, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(firefly.x + 5, firefly.y - 4, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#2c1810';
                ctx.beginPath();
                ctx.arc(firefly.x - 5.5, firefly.y - 4.5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(firefly.x + 4.5, firefly.y - 4.5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(firefly.x, firefly.y + 4, 7, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#aa6633';
                ctx.lineWidth = 1.8;
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(255, 100, 100, 0.4)';
                ctx.beginPath();
                ctx.ellipse(firefly.x - 9, firefly.y + 2, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(firefly.x + 9, firefly.y + 2, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // НАДПИСЬ GAME OVER НА КАНВАСЕ
            if (!gameActive && gameStatusText.textContent === 'GAME OVER') {
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.shadowBlur = 8;
                ctx.textAlign = 'center';
                ctx.fillText('💀 GAME OVER 💀', canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;
                ctx.textAlign = 'left';
            }
        }
        
        function animate() {
            draw();
            requestAnimationFrame(animate);
        }
        
        canvas.addEventListener('click', checkCatch);
        canvas.addEventListener('touchstart', checkCatch, { passive: false });
        
        const restartBtn = document.getElementById('restartBtnPanel');
        if (restartBtn) restartBtn.addEventListener('click', () => {
            resetGame();
        });
        
        randomMoveFirefly();
        startIdleMovement();
        updatePanels();
        animate();
        
        console.log('✨ Tunnel: 589px on button, 33px far | GAME OVER text on canvas ✨');
    </script>
</body>
</html>
